name: test
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# develop へ push すると push と pull_request の両イベントが発火し、
# 同じコミットに対してテストが2回実行されてしまう。
# concurrency group を設定し、同一ブランチの重複実行を防ぐ。
#
# グループ名の仕組み:
#   - pull_request イベント: github.head_ref = "develop"  → group = "test-develop"
#   - push イベント:         github.head_ref = ""(空)     → github.ref_name = "develop" → group = "test-develop"
# 両イベントで同じグループ名になるため、後発の実行が先行をキャンセルする。
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test
